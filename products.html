<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Products — NOOR Atelier Console</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="sidebar-scrim" id="sidebarScrim"></div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebarMount"></aside>

    <div class="main-col">
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle" aria-label="Open menu">☰</button>
        <div class="topbar-titles">
          <h1 id="pageTitle">Products</h1>
          <p id="pageSubtitle">Manage your catalog, pricing and stock</p>
        </div>
        <div class="topbar-actions">
          <span class="topbar-date" id="topbarDate"></span>
          <button class="bell-btn" id="bellBtn" title="Alerts">🔔<span class="bell-dot" id="bellDot"></span></button>
        </div>
      </header>

      <main class="content">
        <div class="panel-card">
          <div class="panel-card-head">
            <div>
              <h2>Catalog</h2>
              <p id="productCountLabel">0 products</p>
            </div>
            <div class="row-flex">
              <button class="btn btn-outline btn-sm" id="exportProductsBtn">Export CSV</button>
              <button class="btn btn-accent" id="addProductBtn">+ Add Product</button>
            </div>
          </div>

          <div class="toolbar">
            <input type="search" id="productSearch" placeholder="Search products…">
            <select id="categoryFilter">
              <option value="All">All categories</option>
            </select>
            <select id="stockFilter">
              <option value="All">All stock levels</option>
              <option value="low">Low stock (≤5)</option>
              <option value="out">Out of stock</option>
            </select>
            <div class="spacer"></div>
          </div>

          <div class="table-scroll">
            <table class="data-table">
              <thead>
                <tr>
                  <th></th>
                  <th class="sortable" data-sort="title">Product <span class="sort-arrow">↕</span></th>
                  <th class="sortable" data-sort="category">Category <span class="sort-arrow">↕</span></th>
                  <th class="sortable" data-sort="price">Price <span class="sort-arrow">↕</span></th>
                  <th class="sortable" data-sort="stock">Stock <span class="sort-arrow">↕</span></th>
                  <th>Featured #</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="productsBody"></tbody>
            </table>
          </div>
          <div id="productsEmpty" class="empty-state" hidden>
            <div class="glyph">◫</div>
            <h3>No products found</h3>
            <p>Try a different search or filter, or add a new product.</p>
          </div>

          <div class="pagination" id="productsPagination"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add / Edit product modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-box">
      <div class="modal-head">
        <div>
          <h2 id="productModalTitle">Add Product</h2>
          <p>Fields marked required must be filled in</p>
        </div>
        <button class="modal-close" onclick="closeModal('productModal')" aria-label="Close">&times;</button>
      </div>
      <form id="productForm">
        <input type="hidden" id="productId">
        <div class="form-grid">
          <div class="field wide">
            <label for="productTitle">Title *</label>
            <input type="text" id="productTitle" required placeholder="e.g. Emerald Zari Kurta">
          </div>
          <div class="field">
            <label for="productCategory">Category *</label>
            <select id="productCategory" required></select>
          </div>
          <div class="field">
            <label for="productSub">Sub-category *</label>
            <input type="text" id="productSub" required placeholder="e.g. Stitched">
          </div>
          <div class="field">
            <label for="productPrice">Price (Rs.) *</label>
            <input type="number" id="productPrice" required min="0" step="1">
          </div>
          <div class="field">
            <label for="productStock">Stock quantity *</label>
            <input type="number" id="productStock" required min="0" step="1">
          </div>
          <div class="field">
            <label for="productColor">Swatch color</label>
            <input type="color" id="productColor" value="#8d2538">
          </div>
          <div class="field">
            <label for="productAccent">Accent color</label>
            <input type="color" id="productAccent" value="#b98a3d">
          </div>
          <div class="field">
            <label for="productFeatured">Featured order #</label>
            <input type="number" id="productFeatured" min="0" step="1" placeholder="0 = not featured">
          </div>
          <div class="field">
            <label for="productImage">Image filename</label>
            <input type="text" id="productImage" placeholder="item-1.jpg">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal('productModal')">Cancel</button>
          <button type="submit" class="btn btn-accent">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete confirm modal -->
  <div class="modal-overlay" id="deleteProductModal">
    <div class="modal-box">
      <div class="modal-head">
        <div>
          <h2>Remove product?</h2>
          <p id="deleteProductText">This can't be undone.</p>
        </div>
        <button class="modal-close" onclick="closeModal('deleteProductModal')" aria-label="Close">&times;</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('deleteProductModal')">Cancel</button>
        <button class="btn btn-danger" id="confirmDeleteProductBtn">Remove Product</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="admin.js"></script>
  <script src="products.js"></script>
</body>
</html>
